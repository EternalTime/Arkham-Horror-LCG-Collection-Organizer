    if (deck.wishlist[code] > 1) deck.wishlist[code]--;
    else { delete deck.wishlist[code]; if (deck.wishlinks) delete deck.wishlinks[code]; }
  }
  if (a === "upgrade") { BSTATE.upgradeFrom = JSON.parse(JSON.stringify(curDeck().slots)); BSTATE.costOverride = {}; }
  if (a === "cancelupgrade") { curDeck().slots = BSTATE.upgradeFrom; BSTATE.upgradeFrom = null; }
  if (a === "commit") {
    const deck = curDeck();
    const items = DL.upgradeCost(BSTATE.upgradeFrom, deck.slots)
      .map(i => ({ ...i, cost: BSTATE.costOverride[i.code] ?? i.cost }));
    const total = items.reduce((x, i) => x + i.cost, 0);
    (deck.purchases = deck.purchases || []).push({ date: new Date().toISOString().slice(0,10), items, total });
    BSTATE.upgradeFrom = null;
  }
  if (a === "adjxp") {
    const deck = curDeck();
    const v = await uiPrompt("Manual XP adjustment (e.g. -1 per Adaptable swap refund, Arcane Research discounts):", deck.xpAdj || 0);
    if (v !== null) deck.xpAdj = +v || 0;
  }
  if (a === "export") {
    download("ahlcg_all_decks.json",
      { format: "ahlcg-all", sets: B.sets, decks: B.decks });
  }
  if (a === "exportset") {
    const s = curSet();
    const decks = {};
    for (const id of s.decks) if (B.decks[id]) decks[id] = B.decks[id];
    const fname = (s.name || "deck_set").replace(/[^\w\- ]+/g, "").trim()
      .replace(/\s+/g, "_") || "deck_set";
    download(fname + ".json", { format: "ahlcg-deckset", set: s, decks });
  }
  if (a === "import") {
    const f = $("impfile");
    f.onchange = async () => {
      const files = [...f.files];
      f.value = "";                       // let the same file be picked again later
      let n = 0, bad = 0;
      // if a set with the same name exists, offer to replace it (Cancel keeps both)
      const importSet = async (set, decks) => {
        const dup = Object.values(B.sets).find(s => s.name === set.name);
        if (dup && await uiConfirm(`A deck set named "${dup.name}" already exists.\nOK = replace it, Cancel = keep both.`)) {
          for (const id of dup.decks || []) delete B.decks[id];
          delete B.sets[dup.id];
          if (B.setOrder) B.setOrder = B.setOrder.filter(x => x !== dup.id);
          if (BSTATE.setId === dup.id) { BSTATE.setId = null; BSTATE.deckId = null; BSTATE.view = "home"; }
        }
        mergeSet(set, decks);
      };
      for (const file of files) {
        try {
          const d = JSON.parse(await file.text());
          if (d.format === "ahlcg-deckset" && d.set) { await importSet(d.set, d.decks || {}); n++; }
          else if (d.sets) { for (const s of Object.values(d.sets)) { await importSet(s, d.decks || {}); n++; } }
          else throw 0;
        } catch (e) { bad++; }
      }
      if (n) {
        saveB();
        BSTATE = { open: true, view: "home", setId: null, deckId: null, picking: false, upgradeFrom: null };
        renderBuilder();
      }
      const msg = n ? `imported ${n} deck set${n !== 1 ? "s" : ""}` : "";
      const err = bad ? `${bad} invalid file${bad !== 1 ? "s" : ""} skipped` : "";
      toast([msg, err].filter(Boolean).join(" · ") || "invalid file");
    };
    f.click();
    return;
  }
  saveB(); renderBuilder(); apply();
}
function download(fname, obj) {
  const blob = new Blob([JSON.stringify(obj, null, 1)], { type: "application/json" });
  const u = URL.createObjectURL(blob);
  const l = document.createElement("a");
  l.href = u; l.download = fname; l.click();
  URL.revokeObjectURL(u);
}
// merge an imported set + its decks under fresh ids (no collisions possible)
function mergeSet(set, decks) {
  const idMap = {};
  for (const oldId of set.decks || []) {
    const d = decks[oldId];
    if (!d) continue;
    const newId = nid();
    idMap[oldId] = newId;
    B.decks[newId] = { ...JSON.parse(JSON.stringify(d)), id: newId };
  }
  const s = JSON.parse(JSON.stringify(set));
  s.id = nid();
  s.decks = (set.decks || []).map(o => idMap[o]).filter(Boolean);
  migrateSet(s);            // accepts both old (set.log) and new (set.run) formats
  const remap = o => Object.fromEntries(Object.entries(o || {})
    .filter(([k]) => idMap[k]).map(([k, v]) => [idMap[k], v]));
  s.run.log = s.run.log.map(e => ({ ...e, xp: remap(e.xp), trauma: remap(e.trauma) }));
  B.sets[s.id] = s;
  B.setOrder.push(s.id);
}
function field(n) {
  if (n.dataset.f === "setname") curSet().name = n.value;
  if (n.dataset.f === "deckname") curDeck().name = n.value;
  if (n.dataset.f === "campaign") {
    const s = curSet();
    s.campaign = n.value;
    s.run.code = CAMPAIGN_CODE[n.value] || null;
  }
  if (n.dataset.f === "decknotes") { curDeck().notes = n.value; saveB(); return; }
  saveB(); renderBuilder();
}
/* draggable panel border */
(() => {
  const grip = $("bgrip");
  let dragging = false;
  const setW = w => {
    w = Math.max(300, Math.min(Math.round(w), Math.round(innerWidth * 0.7)));
    document.documentElement.style.setProperty("--bw", w + "px");
    return w;
  };
  const saved = +localStorage.getItem("ahlcg_bw");
  if (saved) setW(saved);
  grip.addEventListener("pointerdown", e => {
    dragging = true;
    document.body.classList.add("resizing");
    grip.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  grip.addEventListener("pointermove", e => { if (dragging) setW(innerWidth - e.clientX); });
  const end = () => {
    if (!dragging) return;
    dragging = false;
    document.body.classList.remove("resizing");
    localStorage.setItem("ahlcg_bw",
      parseInt(getComputedStyle(document.documentElement).getPropertyValue("--bw")) || 360);
  };
  grip.addEventListener("pointerup", end);
  grip.addEventListener("pointercancel", end);
})();
/* ---- docs panel ---- */
let docsOpen = false;
function renderDocs() {
  const el = $("docspanel");
  el.innerHTML = `<div class="dochead">
      <h2>Documents</h2>
      <div class="sub">Guides &middot; Logs &middot; Rules</div>
    </div>` +
    AHLCG_DOCS.map(g => `<div class="docgroup" style="--dc:${CAMPAIGN_COLOR[g.group] || "var(--accent)"}">
      <div class="gt">${g.group}</div>
      ${g.docs.map(([title, file]) =>
        `<a class="doc" href="guides/${file}.pdf" target="_blank" rel="noopener">${title}</a>`).join("")}
    </div>`).join("");
}
function setDocs(open) {
  docsOpen = open;
  document.body.classList.toggle("docsopen", docsOpen);
  $("btnDocs").innerHTML = docsOpen ? "Close &#9656;" : "Docs";
  if (docsOpen) renderDocs();
}
function setDecks(open) {
  BSTATE.open = open;
  document.body.classList.toggle("building", BSTATE.open);
  if (!open) {
    document.documentElement.style.removeProperty("--winc");
    nativeWinColor("#131318");
  }
  $("btnDecks").innerHTML = BSTATE.open ? "Close &#9656;" : "Decks";
  if (BSTATE.open) renderBuilder();
}
/* filter group flyouts: each toggles independently */
document.querySelectorAll("#filterbar .gbtn[data-fg]").forEach(b => b.addEventListener("click", () => {
  const row = $(b.dataset.fg);
  const open = row.classList.toggle("open");
  b.innerHTML = b.dataset.label + (open ? " &#9662;" : " &#9656;");
}));
$("btnDocs").addEventListener("click", () => {
  if (BSTATE.open) setDecks(false);
  setDocs(!docsOpen);
  apply();
});
$("btnDecks").addEventListener("click", () => {
  if (docsOpen) setDocs(false);
  setDecks(!BSTATE.open);
  apply();
});
</script>
